name: Update Google Scholar Citations

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at 00:00 UTC
  workflow_dispatch: # Allows manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update-citations:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bibtexparser scholarly fuzzywuzzy python-Levenshtein "httpx<0.28"
          
      - name: Run Scholar check script
        run: python assets/code/check_references_from_Google_Scholar.py
        
      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5.0.1
        with:
          commit_message: 'chore: auto-update Google Scholar citations'
          file_pattern: '_bibliography/papers.bib _data/scholar_citations.csv _data/missing_or_issues_with_Scholar_citations.csv'
