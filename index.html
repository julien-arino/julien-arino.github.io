---
layout: default
---

{% for post in site.posts limit:10 %}
  <article class="module color3">
    <h2>
      <a class="red" href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
    </h2>
    <time>{{ post.date| date: "%Y-%m-%d" }}</time>
    <p>
      {% if post.description %}{{ post.description }}{% else %}{{ post.content | strip_html | truncate: 250 }}{% endif %}
    </p>
  </article>
{% endfor %}

{% if site.posts > 10 %}
  <section class="module color3">
    <a href="{{ 'archives' | prepend: site.baseurl }}">Older posts &rarr;</a>
  </section>
{% endif %}
